services:
  db:
    image: postgres:16-alpine
    container_name: securetracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securetracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securetracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/securetracker
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"

  # Optional: Prisma Studio for database management
  studio:
    image: node:20-alpine
    container_name: securetracker-studio
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/securetracker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5555:5555"
    command: sh -c "npm install && npx prisma studio"
    profiles:
      - dev

volumes:
  postgres_data:
